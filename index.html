<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Operacional</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #08110c;
      color: #e8fff2;
      min-height: 100vh;
    }

    .topbar {
      padding: 20px 16px;
      border-bottom: 1px solid #173124;
      background: #0c1711;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar h1 {
      font-size: 24px;
      color: #7dffb2;
      margin-bottom: 6px;
    }

    .topbar p {
      color: #9db9aa;
      font-size: 14px;
    }

    .container {
      padding: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      background: linear-gradient(180deg, #101d16, #0c1510);
      border: 1px solid #1d3c2d;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    .card span {
      display: block;
      color: #96b7a4;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .card strong {
      font-size: 28px;
      color: #7dffb2;
    }

    .menu {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 18px;
      padding-bottom: 4px;
    }

    .menu button {
      border: 1px solid #244635;
      background: #101b15;
      color: #c9f7da;
      padding: 10px 14px;
      border-radius: 999px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: bold;
    }

    .menu button.active {
      background: #123524;
      border-color: #56db91;
      color: #7dffb2;
    }

    .panel {
      background: #0d1611;
      border: 1px solid #183223;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .panel-header {
      margin-bottom: 14px;
    }

    .panel-header h2 {
      color: #7dffb2;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .panel-header p {
      color: #93ae9f;
      font-size: 14px;
    }

    .form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .form input {
      width: 100%;
      background: #09100c;
      border: 1px solid #264836;
      color: white;
      padding: 13px 14px;
      border-radius: 12px;
      outline: none;
    }

    .form button {
      background: linear-gradient(180deg, #1d6f46, #145133);
      color: white;
      border: none;
      padding: 13px 14px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      background: #101a14;
      border: 1px solid #203e2e;
      border-radius: 14px;
      padding: 14px;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 8px;
    }

    .item strong {
      font-size: 17px;
      color: #f2fff7;
    }

    .badge {
      background: #143725;
      color: #7dffb2;
      border: 1px solid #2f6f4f;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .item small {
      color: #96b7a4;
      display: block;
      margin-top: 4px;
      margin-bottom: 10px;
    }

    .remove-btn {
      background: #2a1114;
      border: 1px solid #6a2a35;
      color: #ff9dac;
      padding: 10px 12px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .empty {
      text-align: center;
      padding: 24px;
      border: 1px dashed #2b4c3a;
      border-radius: 14px;
      color: #91ad9e;
    }

    @media (min-width: 768px) {
      .stats {
        grid-template-columns: repeat(5, 1fr);
      }

      .form {
        grid-template-columns: 1fr 180px;
      }

      .remove-btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>PAINEL OPERACIONAL</h1>
    <p>Controle de efetivos, treinamentos, apreensões, recrutas e saídas</p>
  </div>

  <div class="container">
    <div class="stats">
      <div class="card"><span>Efetivos</span><strong id="stat-efetivos">0</strong></div>
      <div class="card"><span>Treinamentos</span><strong id="stat-treinamentos">0</strong></div>
      <div class="card"><span>Apreensões</span><strong id="stat-apreensoes">0</strong></div>
      <div class="card"><span>Recrutas</span><strong id="stat-recrutas">0</strong></div>
      <div class="card"><span>Saídas</span><strong id="stat-saidas">0</strong></div>
    </div>

    <div class="menu">
      <button class="tab-btn active" onclick="mudar('efetivos', this)">Efetivos</button>
      <button class="tab-btn" onclick="mudar('treinamentos', this)">Treinamentos</button>
      <button class="tab-btn" onclick="mudar('apreensoes', this)">Apreensões</button>
      <button class="tab-btn" onclick="mudar('recrutas', this)">Recrutas</button>
      <button class="tab-btn" onclick="mudar('saidas', this)">Saídas</button>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2 id="titulo">EFETIVOS</h2>
        <p id="subtitulo">Gerencie e acompanhe os registros desta categoria.</p>
      </div>

      <div class="form">
        <input id="nome" placeholder="Digite o nome ou registro" />
        <button onclick="adicionar()">Adicionar</button>
      </div>

      <div id="lista" class="list"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      deleteDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_6lK71tjgHEhejZ7hM70VTnElWA1pp_U",
      authDomain: "paniel-892e5.firebaseapp.com",
      projectId: "paniel-892e5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const secoes = ["efetivos", "treinamentos", "apreensoes", "recrutas", "saidas"];
    let aba = "efetivos";
    let unsubscribeAtual = null;

    const descricoes = {
      efetivos: "Gerencie e acompanhe o efetivo operacional.",
      treinamentos: "Registre treinamentos, cursos e capacitações.",
      apreensoes: "Controle itens e registros de apreensão.",
      recrutas: "Acompanhe novos recrutas cadastrados.",
      saidas: "Histórico de desligamentos e saídas."
    };

    function atualizarBotaoAtivo(botao) {
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      botao.classList.add("active");
    }

    function atualizarTitulo() {
      document.getElementById("titulo").innerText = aba.toUpperCase();
      document.getElementById("subtitulo").innerText = descricoes[aba];
    }

    function atualizarEstatisticas() {
      secoes.forEach(secao => {
        onSnapshot(collection(db, secao), (snapshot) => {
          const el = document.getElementById("stat-" + secao);
          if (el) el.innerText = snapshot.size;
        });
      });
    }

    window.mudar = function(nova, botao) {
      aba = nova;
      atualizarBotaoAtivo(botao);
      atualizarTitulo();
      carregarLista();
    };

    window.adicionar = async function() {
      const input = document.getElementById("nome");
      const nome = input.value.trim();

      if (!nome) {
        alert("Digite um nome ou registro.");
        return;
      }

      await addDoc(collection(db, aba), {
        nome,
        data: new Date().toLocaleString("pt-BR")
      });

      input.value = "";
    };

    window.remover = async function(id) {
      await deleteDoc(doc(db, aba, id));
    };

    function carregarLista() {
      if (unsubscribeAtual) unsubscribeAtual();

      unsubscribeAtual = onSnapshot(collection(db, aba), (snapshot) => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (snapshot.empty) {
          lista.innerHTML = `<div class="empty">Nenhum registro encontrado nesta categoria.</div>`;
          return;
        }

        snapshot.forEach((docu) => {
          const item = docu.data();

          lista.innerHTML += `
            <div class="item">
              <div class="item-top">
                <div>
                  <strong>${item.nome}</strong>
                  <small>${item.data || ""}</small>
                </div>
                <span class="badge">${aba.toUpperCase()}</span>
              </div>
              <button class="remove-btn" onclick="remover('${docu.id}')">Remover</button>
            </div>
          `;
        });
      });
    }

    atualizarTitulo();
    atualizarEstatisticas();
    carregarLista();
  </script>
</body>
</html>
